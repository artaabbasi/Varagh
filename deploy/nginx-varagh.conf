# Varagh — nginx site (install at /etc/nginx/sites-available/varagh).
#
# Two origins:
#   varagh.artanova.top         → static PWA from /opt/varagh/web
#   varagh-server.artanova.top  → Socket.IO server on 127.0.0.1:3001
#
# The web bundle is built with VITE_SERVER_URL=https://varagh-server.artanova.top
# (see scripts/deploy.sh) and the server's WEB_ORIGIN must allow
# https://varagh.artanova.top (see deploy/varagh.service).

# ---- HTTP -> HTTPS for both subdomains ----
server {
    listen 80;
    listen [::]:80;
    server_name varagh.artanova.top varagh-server.artanova.top;
    return 301 https://$host$request_uri;
}

# ---- Web app (PWA) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name varagh.artanova.top;

    ssl_certificate     /etc/ssl/varagh/fullchain.pem;
    ssl_certificate_key /etc/ssl/varagh/privkey.pem;

    root /opt/varagh/web;
    index index.html;

    # Vite's hashed assets never change — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # These must revalidate so the PWA "Update available" banner works
    location = /sw.js               { add_header Cache-Control "no-cache"; }
    location = /registerSW.js       { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest{ add_header Cache-Control "no-cache"; }
    location = /index.html          { add_header Cache-Control "no-cache"; }

    # SPA fallback (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---- Socket.IO game server ----
server {
    listen 443 ssl;          # no http2 here — keeps classic WebSocket upgrade simple
    listen [::]:443 ssl;
    server_name varagh-server.artanova.top;

    ssl_certificate     /etc/ssl/varagh/fullchain.pem;
    ssl_certificate_key /etc/ssl/varagh/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived sockets
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
