# Varagh — Nginx configuration
# Serves the Vite PWA and proxies Socket.IO WebSocket/long-poll to the server
# container (reachable as "server" via Docker Compose internal DNS).

upstream backend {
    server server:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ── Vite-hashed assets (immutable, cache for 1 year) ─────────────────────
    location ^~ /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PWA service worker (must never be cached) ─────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── Socket.IO — WebSocket upgrade + long-poll fallback ───────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  86400s;   # keep WebSocket connections alive
        proxy_send_timeout  86400s;
    }

    # ── SPA catch-all — every unknown path falls back to index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
